# OpenAPI Generator 配置文件
# 用于生成 TypeScript Axios 客户端

generatorName: typescript-axios

# 输入规范文件
inputSpec: openapi/openapi.yaml

# 输出目录
outputDir: src/api/generated

# 生成器特定配置
additionalProperties:
  # 支持 ES6 模块
  supportsES6: true

  # 使用单引号
  useSingleRequestParameters: true

  # 生成接口而不是类
  withInterfaces: true

  # 不生成默认的 API 客户端（我们会自定义）
  withoutRuntimeChecks: false

  # 使用日期时间字符串而不是 Date 对象
  stringEnums: true

  # 模型属性命名风格：camelCase
  modelPropertyNaming: camelCase

  # 枚举属性命名风格：PascalCase
  enumPropertyNaming: PascalCase

# 全局属性
globalProperties:
  # 生成所有模型，即使未使用
  models: ""
  apis: ""
  supportingFiles: ""

# 类型映射（可选，用于自定义类型生成）
typeMappings:
  # 将 datetime 映射为 string
  datetime: "string"
  date: "string"

# 文档生成配置
generateApiTests: false
generateModelTests: false

# 包信息（生成的 package.json 会被忽略，但这里保留信息）
npmName: "@ybc/api-client"
npmVersion: "1.0.0"
npmDescription: "用友 BIP OpenAPI TypeScript 客户端"

# TypeScript 配置
typescriptThreePlus: true

# 代码格式化
prependFormOrBodyParameters: false